name: Auto Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
      
    - name: 🟢 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: ☕ 设置Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 📦 安装依赖
      run: npm install
      
    - name: 🔨 预构建Android项目
      run: npx expo prebuild --platform android
      
    - name: 🔧 构建APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease
        
    - name: 📤 上传APK
      uses: actions/upload-artifact@v4
      with:
        name: WatermarkCamera-APK
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 7
        
    - name: 📊 完成
      run: |
        echo "✅ APK构建成功！"
        echo "📦 下载链接在 Artifacts 中"
